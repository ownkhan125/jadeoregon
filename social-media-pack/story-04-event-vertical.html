<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Story 04 — Event Vertical</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:#11161e;display:grid;place-items:center;
    font-family:'Space Grotesk',system-ui,sans-serif;padding:48px;
  }
  .canvas{
    width:540px;height:960px;position:relative;overflow:hidden;
    background:#f7dd7d;color:#0a1226;
    box-shadow:0 60px 140px -40px rgba(0,0,0,.6);
  }
  .grain{
    position:absolute;inset:0;pointer-events:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.7'/></svg>");
    opacity:.16;mix-blend-mode:multiply;
  }
  .top-bar{
    position:absolute;top:54px;left:30px;right:30px;
    display:flex;justify-content:space-between;align-items:center;
    font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.32em;text-transform:uppercase;
    color:rgba(10,18,38,.7);
  }
  .top-bar b{color:#0a1226;font-weight:500}

  /* stamp top-right */
  .stamp{
    position:absolute;top:108px;right:24px;
    width:86px;height:86px;border-radius:50%;
    border:1px dashed rgba(10,18,38,.5);
    display:grid;place-items:center;text-align:center;
    font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.32em;text-transform:uppercase;
    color:#0a1226;line-height:1.4;background:#f7dd7d;
    transform:rotate(-8deg);
  }
  .stamp::before{
    content:"★";position:absolute;top:-7px;left:50%;transform:translateX(-50%);
    background:#f7dd7d;padding:0 4px;color:#0a1226;font-size:12px;
  }

  /* ticket main */
  .ticket{
    position:absolute;left:24px;right:24px;top:110px;bottom:110px;
    background:#fdf6e6;color:#0a1226;
    border-radius:2px;
    box-shadow:0 24px 60px -20px rgba(10,18,38,.35);
    overflow:hidden;
    display:flex;flex-direction:column;
  }
  .ticket::before{
    content:"";position:absolute;left:-10px;top:50%;width:20px;height:20px;border-radius:50%;background:#f7dd7d;
  }
  .ticket::after{
    content:"";position:absolute;right:-10px;top:50%;width:20px;height:20px;border-radius:50%;background:#f7dd7d;
  }

  .ticket-top{
    background:#0a1226;color:#ffe8be;padding:16px 22px;
    display:flex;justify-content:space-between;align-items:center;
    font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.32em;text-transform:uppercase;
  }
  .ticket-top b{color:#f7dd7d;font-weight:500}

  .ticket-body{
    padding:32px 26px 22px;flex:1;display:flex;flex-direction:column;justify-content:space-between;
  }
  .date-stack{
    display:flex;align-items:flex-start;gap:18px;
  }
  .day-num{
    font-family:'DM Serif Display',serif;font-weight:400;font-size:130px;line-height:.85;letter-spacing:-.04em;color:#0a1226;
  }
  .day-info{flex:1;padding-top:14px}
  .day-info .row{
    font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.32em;text-transform:uppercase;
    color:rgba(10,18,38,.7);margin-bottom:6px;
  }
  .day-info .month{
    font-family:'DM Serif Display',serif;font-size:24px;line-height:1;letter-spacing:-.015em;color:#406aaf;margin-top:4px;
  }

  .perf{
    margin:16px -26px;height:1px;
    background-image:linear-gradient(90deg, #0a1226 50%, transparent 50%);background-size:10px 1px;background-repeat:repeat-x;opacity:.3;
  }

  .event-info h1{
    font-family:'DM Serif Display',serif;font-weight:400;
    font-size:36px;line-height:1.04;letter-spacing:-.015em;color:#0a1226;
  }
  .event-info h1 em{font-style:italic;color:#406aaf}
  .event-info .where{
    margin-top:10px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.28em;text-transform:uppercase;
    color:rgba(10,18,38,.6);
  }
  .event-info p{margin-top:12px;font-size:12px;line-height:1.55;color:rgba(10,18,38,.75);max-width:340px}

  /* CTA strip — inside ticket */
  .cta-strip{
    margin:14px -26px -22px;background:#0a1226;color:#f7dd7d;
    padding:14px 22px;
    display:flex;justify-content:space-between;align-items:center;
    font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.28em;text-transform:uppercase;
  }
  .cta-strip .send{
    width:28px;height:28px;border-radius:50%;background:#f7dd7d;color:#0a1226;
    display:grid;place-items:center;font-size:14px;
  }

  /* bottom bar */
  .bot-bar{
    position:absolute;bottom:46px;left:30px;right:30px;
    display:flex;justify-content:space-between;align-items:center;
    padding-top:14px;border-top:1px solid rgba(10,18,38,.3);
    font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.32em;text-transform:uppercase;
    color:rgba(10,18,38,.7);
  }
  .bot-bar b{color:#0a1226;font-weight:500}
</style>
</head>
<body>
  <div class="canvas">
    <header class="top-bar">
      <span><b>SAVE THE DATE</b> · 04</span>
      <span>OR-05 · 2026</span>
    </header>

    <div class="stamp">Free<br>·<br>RSVP</div>

    <div class="ticket">
      <div class="ticket-top"><span>★ Vol. 04 Event</span><span><b>OR-05</b></span></div>
      <div class="ticket-body">
        <div>
          <div class="date-stack">
            <div class="day-num">18</div>
            <div class="day-info">
              <div class="row">Saturday</div>
              <div class="month">April · 2026</div>
              <div class="row" style="margin-top:16px">06:30 PM · Doors 6:00</div>
            </div>
          </div>
        </div>

        <div>
          <div class="perf"></div>
          <div class="event-info">
            <h1>Lorem <em>Ipsum</em><br>Town Hall.</h1>
            <div class="where">— Salem Civic Auditorium</div>
            <p>Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.</p>
          </div>
          <div class="cta-strip">
            <span>Reserve your seat</span>
            <span class="send">→</span>
          </div>
        </div>
      </div>
    </div>

    <footer class="bot-bar">
      <span><b>JADE · OR-05</b></span>
      <span>Jadeoregon.com</span>
    </footer>

    <div class="grain"></div>
  </div>
</body>
</html>
